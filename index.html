<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>PRINCE ELITE v4.0 | ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050608;
            --sidebar: #0b0d11;
            --accent: #5086bd;
            --accent-glow: rgba(80, 134, 189, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.07);
            --text: #e2e8f0;
            --text-dim: #64748b;
        }

        * { box-sizing: border-box; outline: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Layout */
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { width: 350px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 30px 25px; border-bottom: 1px solid var(--border); }
        .logo { font-size: 18px; font-weight: 800; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
        
        .search-area { padding: 15px 20px; }
        .search-bar { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px 15px; border-radius: 12px; color: #fff; }

        .contacts-list { flex: 1; overflow-y: auto; padding: 10px; }
        .contact-card { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 15px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; }
        .contact-card:hover { background: var(--glass); }
        .contact-card.active { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .avatar { width: 45px; height: 45px; border-radius: 14px; background: var(--border); display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-top: 5px; }

        /* Main Chat */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at center, #0a0c12 0%, #050608 100%); }
        
        .chat-header { height: 80px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
        #messages-container { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }

        /* Bubbles */
        .msg { max-width: 65%; display: flex; flex-direction: column; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.out { align-self: flex-end; }
        .msg.in { align-self: flex-start; }

        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 15px; line-height: 1.5; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .out .bubble { background: linear-gradient(135deg, #5086bd, #2a4b6b); color: white; border-bottom-right-radius: 4px; border-color: rgba(255,255,255,0.1); }
        .in .bubble { background: #1c2128; border-bottom-left-radius: 4px; }

        .reply-box-in-msg { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 10px; border-left: 3px solid var(--accent); margin-bottom: 8px; font-size: 13px; opacity: 0.8; }

        /* Context Menu (Hover) */
        .msg-tools { position: absolute; top: -30px; display: none; gap: 10px; background: #161b22; padding: 5px 12px; border-radius: 10px; border: 1px solid var(--border); z-index: 5; }
        .msg:hover .msg-tools { display: flex; }
        .out .msg-tools { right: 0; }
        .in .msg-tools { left: 0; }
        .tool-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tool-btn:hover { color: var(--accent); }

        /* Input Area */
        .input-area { padding: 25px 40px; background: var(--sidebar); border-top: 1px solid var(--border); }
        .reply-preview { display: none; background: var(--glass); padding: 10px 20px; border-radius: 10px 10px 0 0; border: 1px solid var(--border); border-bottom: none; align-items: center; justify-content: space-between; }
        
        .input-wrapper { display: flex; align-items: center; gap: 15px; background: var(--bg); border: 1px solid var(--border); padding: 10px 20px; border-radius: 15px; }
        .input-wrapper input { flex: 1; background: none; border: none; color: white; padding: 10px 0; font-size: 15px; }
        .send-btn { background: var(--accent); border: none; color: white; padding: 10px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--sidebar); padding: 50px; border-radius: 30px; border: 1px solid var(--border); width: 400px; text-align: center; }
        .modal input { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <div class="logo" style="margin-bottom: 30px;">PRINCE ELITE</div>
        <input type="text" id="user-name" placeholder="Display Name">
        <input type="text" id="user-handle" placeholder="@username">
        <button class="send-btn" style="width: 100%;" onclick="login()">ENTER SYSTEM</button>
    </div>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header"><div class="logo">PRINCE</div></div>
        <div class="search-area"><input type="text" class="search-bar" placeholder="Search chats..." oninput="searchUsers(this.value)"></div>
        <div id="contacts-list" class="contacts-list">
            <div class="contact-card active" onclick="selectChat('global')">
                <div class="avatar">#</div>
                <div style="flex:1"><b>Global Channel</b><br><small style="color:var(--text-dim)">Community Space</small></div>
            </div>
            <div id="private-contacts"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header">
            <div><b id="active-chat-name">Global Channel</b><div id="typing-status" style="font-size: 11px; color: var(--accent); height: 15px;"></div></div>
        </div>
        
        <div id="messages-container"></div>

        <div class="input-area">
            <div id="reply-preview" class="reply-preview">
                <div id="reply-text" style="font-size: 12px; color: var(--text-dim);"></div>
                <button onclick="cancelReply()" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
            </div>
            <form id="msg-form" class="input-wrapper">
                <input type="text" id="msg-input" placeholder="Write a message..." autocomplete="off">
                <button type="submit" class="send-btn">SEND</button>
            </form>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let me = JSON.parse(localStorage.getItem('prince_user')) || null;
    let activeChat = 'global', allMessages = [], users = {}, replyTo = null;

    if (!me) { document.getElementById('auth-modal').style.display = 'flex'; } 
    else { document.getElementById('auth-modal').style.display = 'none'; init(); }

    function login() {
        const name = document.getElementById('user-name').value;
        const handle = document.getElementById('user-handle').value.replace('@', '');
        if (name && handle) {
            me = { name, username: handle };
            localStorage.setItem('prince_user', JSON.stringify(me));
            location.reload();
        }
    }

    function init() {
        socket.emit('auth', me);
    }

    socket.on('init_data', data => { allMessages = data.messages; users = data.users; render(); renderUsers(); });
    socket.on('update_users', data => { users = data; renderUsers(); });
    socket.on('new_message', msg => { allMessages.push(msg); render(); });
    socket.on('message_deleted', id => { allMessages = allMessages.filter(m => m.id !== id); render(); });
    
    socket.on('user_typing', data => {
        if(data.user !== me.username) {
            document.getElementById('typing-status').innerText = data.typing ? `${data.user} typing...` : '';
        }
    });

    // Отправка
    document.getElementById('msg-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;

        const msgData = {
            sender: me.name,
            sender_user: me.username,
            text: input.value,
            recipient: activeChat,
            reply: replyTo
        };

        socket.emit('message', msgData);
        input.value = '';
        cancelReply();
        socket.emit('typing', false);
    };

    // Тайпинг
    document.getElementById('msg-input').oninput = (e) => {
        socket.emit('typing', e.target.value.length > 0);
    };

    function renderUsers() {
        const container = document.getElementById('private-contacts');
        container.innerHTML = '';
        Object.keys(users).forEach(u => {
            if (u === me.username) return;
            const user = users[u];
            container.innerHTML += `
                <div class="contact-card ${activeChat === u ? 'active' : ''}" onclick="selectChat('${u}')">
                    <div class="avatar">${user.name[0]}</div>
                    <div style="flex:1"><b>${user.name}</b><br><small>${user.online ? 'online' : 'offline'}</small></div>
                </div>`;
        });
    }

    function render() {
        const container = document.getElementById('messages-container');
        container.innerHTML = '';

        const filtered = allMessages.filter(m => 
            (activeChat === 'global' && m.recipient === 'global') ||
            (m.recipient === me.username && m.sender_user === activeChat) ||
            (m.sender_user === me.username && m.recipient === activeChat)
        );

        filtered.forEach(m => {
            const isMe = m.sender_user === me.username;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'out' : 'in'}`;
            
            let replyHtml = m.reply ? `<div class="reply-box-in-msg"><b>${m.reply.sender}</b><br>${m.reply.text}</div>` : '';

            div.innerHTML = `
                <div class="msg-tools">
                    <button class="tool-btn" onclick="startReply('${m.id}', '${m.sender}', '${m.text}')">Reply</button>
                    ${isMe ? `<button class="tool-btn" style="color:red" onclick="deleteMsg('${m.id}')">Delete</button>` : ''}
                </div>
                ${!isMe ? `<div class="msg-info">${m.sender}</div>` : ''}
                <div class="bubble">${replyHtml}${m.text}</div>
                <div class="msg-info">${m.time}</div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    function startReply(id, sender, text) {
        replyTo = { id, sender, text };
        document.getElementById('reply-preview').style.display = 'flex';
        document.getElementById('reply-text').innerText = `Reply to ${sender}: ${text}`;
        document.getElementById('msg-input').focus();
    }

    function cancelReply() {
        replyTo = null;
        document.getElementById('reply-preview').style.display = 'none';
    }

    function deleteMsg(id) { socket.emit('delete_message', id); }
    
    function selectChat(id) {
        activeChat = id;
        document.getElementById('active-chat-name').innerText = id === 'global' ? 'Global Channel' : users[id].name;
        render();
        renderUsers();
    }

    function searchUsers(val) {
        const cards = document.querySelectorAll('.contact-card');
        cards.forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val.toLowerCase()) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
