<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --sidebar-color: #1e293b; --accent-color: #8b5cf6;
            --text-color: #f8fafc; --message-in: #334155; --message-out: #7c3aed;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 260px; background-color: var(--sidebar-color); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-size: 24px; font-weight: 600; color: var(--accent-color); margin-bottom: 20px; }

        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-header { padding: 15px 25px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #334155; }
        
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg { max-width: 70%; padding: 10px 16px; border-radius: 18px; font-size: 14px; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.in { align-self: flex-start; background: var(--message-in); border-bottom-left-radius: 4px; }
        .msg.out { align-self: flex-end; background: var(--message-out); border-bottom-right-radius: 4px; }
        .msg-info { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 4px; font-weight: 600; }

        #typing-indicator { font-size: 12px; color: var(--accent-color); padding: 5px 25px; height: 20px; font-style: italic; }

        #input-area { padding: 20px; background: var(--sidebar-color); display: flex; gap: 10px; align-items: center; }
        input { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; outline: none; flex: 1; }
        #username { width: 100px; flex: none; border-color: var(--accent-color); }
        button { background: var(--accent-color); border: none; color: white; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        
        /* Скроллбар */
        #chat-messages::-webkit-scrollbar { width: 6px; }
        #chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo">👑 Prince</div>
        <div style="font-size: 13px; color: #94a3b8;">Добро пожаловать в королевство быстрой связи.</div>
        <div style="margin-top: auto; font-size: 11px; opacity: 0.4;">© 2026 Prince Messenger</div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div style="font-weight: 600;">Общий зал</div>
            <div style="font-size: 12px; color: #10b981;">● Онлайн</div>
        </div>

        <div id="chat-messages"></div>
        <div id="typing-indicator"></div>

        <form id="message-form">
            <div id="input-area">
                <input type="text" id="username" placeholder="Ваш ник" maxlength="15">
                <input type="text" id="msg-input" placeholder="Введите сообщение..." required autocomplete="off">
                <button type="submit">🕊</button>
            </div>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chat = document.getElementById('chat-messages');
        const form = document.getElementById('message-form');
        const input = document.getElementById('msg-input');
        const userField = document.getElementById('username');
        const typingDiv = document.getElementById('typing-indicator');

        // Функция отрисовки сообщения
        function appendMessage(data) {
            const isMe = data.user === userField.value;
            const div = document.createElement('div');
            div.classList.add('msg', isMe ? 'out' : 'in');
            div.innerHTML = `<span class="msg-info">${data.user}</span>${data.text}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // Загрузка истории
        socket.on('load history', (history) => {
            chat.innerHTML = '';
            history.forEach(appendMessage);
        });

        // Получение нового сообщения
        socket.on('chat message', (data) => {
            typingDiv.textContent = ''; // Убираем статус печати
            appendMessage(data);
        });

        // Статус "печатает"
        input.addEventListener('input', () => {
            socket.emit('typing', userField.value || 'Кто-то');
        });

        let typingTimeout;
        socket.on('typing', (user) => {
            typingDiv.textContent = `${user} печатает...`;
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { typingDiv.textContent = ''; }, 2000);
        });

        // Отправка
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                const data = { user: userField.value || 'Аноним', text: input.value };
                socket.emit('chat message', data);
                input.value = '';
            }
        });
    </script>
</body>
</html>
