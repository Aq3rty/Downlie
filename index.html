<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE</title>
    <style>
        :root {
            --bg-dark: #0e1117;
            --bg-sidebar: #161d26;
            --accent-blue: #3d6a97;
            --text-main: #ffffff;
            --text-dim: #7d8590;
        }

        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* САЙДБАР (как на скрине 1) */
        #sidebar { width: 310px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #1f2937; }
        .search-container { padding: 15px; }
        .search-bar { width: 100%; background: #212833; border: none; padding: 10px; border-radius: 8px; color: white; font-size: 14px; }
        
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px; cursor: pointer; background: transparent; }
        .chat-item.active { background: var(--accent-blue); }
        .chat-icon { width: 40px; height: 40px; background: #5a89b3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }

        /* ОСНОВНОЙ ЧАТ (как на скрине 2 и 4) */
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #header { height: 60px; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 1px solid #1f2937; }
        .logo-text { font-size: 18px; font-weight: bold; letter-spacing: 2px; color: #5a89b3; }
        .menu-dots { position: absolute; right: 20px; cursor: pointer; color: var(--text-dim); }

        /* Фон с паттерном как на скрине 4 */
        #messages { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='1.5' fill='%23ffffff' fill-opacity='0.05'/%3E%3Ccircle cx='50' cy='40' r='1.5' fill='%23ffffff' fill-opacity='0.05'/%3E%3C/svg%3E");
        }

        /* Сообщения в стиле твоего скрина */
        .msg { max-width: 80%; display: flex; flex-direction: column; position: relative; }
        .msg.in { align-self: flex-start; }
        .msg.out { align-self: flex-end; }
        
        .bubble { padding: 10px 18px; border-radius: 12px; font-size: 15px; line-height: 1.4; }
        .in .bubble { background: #1c242f; color: white; }
        .out .bubble { background: #2b5278; color: white; }
        
        .msg-time { font-size: 10px; color: var(--text-dim); margin: 4px 0; }
        .out .msg-time { text-align: right; }
        .crown { color: #ffd700; margin-left: 5px; text-shadow: 0 0 5px gold; }

        /* ВВОД (как на скрине 1/4) */
        #footer { height: 70px; display: flex; align-items: center; padding: 0 20px; border-top: 1px solid #1f2937; gap: 15px; }
        #m-input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        .send-btn { background: none; border: none; color: #3d6a97; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; }

        /* МОДАЛКА (как на скрине 3) */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: #1c242f; padding: 40px; border-radius: 15px; width: 340px; text-align: center; }
        .modal-ava { width: 80px; height: 80px; border-radius: 50%; background: #d9d9d9; color: #333; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; }
        .modal-input { width: 100%; background: #242f3d; border: 1px solid #3d4a5a; padding: 12px; border-radius: 8px; color: white; margin-bottom: 12px; }
        .save-btn { width: 100%; background: #5a89b3; border: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #admin-panel { display: none; background: #4a1a1a; color: white; text-align: center; padding: 5px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="search-container"><input type="text" class="search-bar" placeholder="Поиск..."></div>
    <div id="contacts">
        <div class="chat-item active" onclick="setChat('global')">
            <div class="chat-icon">#</div>
            <div><b>Общий чат</b><br><small style="color:var(--text-dim)">Публичная комната</small></div>
        </div>
    </div>
</div>

<div id="chat-area">
    <div id="admin-panel" onclick="if(confirm('Удалить всё?')) socket.emit('admin_clear')">УДАЛИТЬ ВСЕ СООБЩЕНИЯ (ВЛАДЕЛЕЦ)</div>
    <div id="header">
        <div class="logo-text" id="chat-title">PRINCE</div>
        <div class="menu-dots" onclick="if(confirm('Выйти?')){localStorage.clear();location.reload();}">⋮</div>
    </div>
    <div id="messages"></div>
    <form id="chat-form">
        <div id="footer">
            <input type="text" id="m-input" placeholder="Написать сообщение..." autocomplete="off">
            <button type="submit" class="send-btn">ОТПРАВИТЬ</button>
        </div>
    </form>
</div>

<div id="modal">
    <div class="modal-card">
        <h2 style="margin-top:0">Профиль</h2>
        <div class="modal-ava">U</div>
        <input type="text" id="set-name" class="modal-input" placeholder="Имя">
        <input type="text" id="set-user" class="modal-input" placeholder="@username">
        <button class="save-btn" onclick="saveProfile()">СОХРАНИТЬ</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myProfile = JSON.parse(localStorage.getItem('prince_v2')) || null;
    let currentChat = 'global';
    let allMessages = [];

    if (!myProfile) {
        document.getElementById('modal').style.display = 'flex';
    } else {
        init();
    }

    function saveProfile() {
        const n = document.getElementById('set-name').value;
        const u = document.getElementById('set-user').value.toLowerCase().replace('@','');
        if(n && u) {
            myProfile = { name: n, username: u, avatar: 'https://ui-avatars.com/api/?name='+n };
            localStorage.setItem('prince_v2', JSON.stringify(myProfile));
            location.reload();
        }
    }

    function init() {
        socket.emit('auth', myProfile);
        if(myProfile.username === 'admin') document.getElementById('admin-panel').style.display = 'block';
    }

    socket.on('init_data', (data) => {
        allMessages = data.messages;
        render();
    });

    socket.on('new_message', (m) => {
        allMessages.push(m);
        render();
        if(m.recipient === myProfile.username && currentChat === m.sender_user) {
            socket.emit('read_chat', { me: myProfile.username, withWhom: currentChat });
        }
    });

    socket.on('messages_read', (data) => {
        allMessages.forEach(m => {
            if(m.sender_user === data.from && m.recipient === data.by) m.read = true;
        });
        render();
    });

    function render() {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        const filtered = allMessages.filter(m => 
            (currentChat === 'global' && m.recipient === 'global') ||
            (m.recipient === myProfile.username && m.sender_user === currentChat) ||
            (m.sender_user === myProfile.username && m.recipient === currentChat)
        );

        filtered.forEach(m => {
            const isMe = m.sender_user === myProfile.username;
            const isOwner = m.sender_user === 'admin' ? '<span class="crown">👑</span>' : '';
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'out' : 'in'}`;
            div.innerHTML = `
                ${!isMe ? `<div class="msg-time" style="text-align:left"><b>${m.sender}</b> ${isOwner}</div>` : ''}
                <div class="bubble">${m.text}</div>
                <div class="msg-time">${m.time} ${isMe ? (m.read ? '<span style="color:#4fc3f7">✓✓</span>' : '✓') : ''}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        const inp = document.getElementById('m-input');
        if(inp.value.trim()) {
            socket.emit('message', {
                sender: myProfile.name,
                sender_user: myProfile.username,
                text: inp.value,
                recipient: currentChat
            });
            inp.value = '';
        }
    };

    socket.on('update_users', (users) => {
        const list = document.getElementById('contacts');
        list.innerHTML = `<div class="chat-item ${currentChat==='global'?'active':''}" onclick="setChat('global')"><div class="chat-icon">#</div><div><b>Общий чат</b><br><small>Публичная комната</small></div></div>`;
        for(let u in users) {
            if(u !== myProfile.username) {
                list.innerHTML += `<div class="chat-item ${currentChat===u?'active':''}" onclick="setChat('${u}')"><div class="chat-icon" style="background:#2b5278">${users[u].name[0]}</div><div><b>${users[u].name} ${u==='admin'?'👑':''}</b><br><small>${users[u].online?'● online':'offline'}</small></div></div>`;
            }
        }
    });

    function setChat(id) {
        currentChat = id;
        socket.emit('read_chat', { me: myProfile.username, withWhom: currentChat });
        render();
    }
</script>
</body>
</html>
